name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          tar -czf deploy.tar.gz -C deploy .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          scp -i private_key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz ${EC2_USERNAME}@${EC2_HOST}:/tmp/deploy.tar.gz

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << 'EOF'
            set -e

            APP_DIR="/var/www/apex-frontend-app/AF_Core"
            RELEASES_DIR="$APP_DIR/releases"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            NEW_RELEASE="$RELEASES_DIR/$TIMESTAMP"

            echo "Creating release directory..."
            sudo mkdir -p "$RELEASES_DIR"
            sudo mkdir -p "$NEW_RELEASE"
            sudo chown -R $USER:$USER "$APP_DIR"

            echo "Extracting new build..."
            tar -xzf /tmp/deploy.tar.gz -C "$NEW_RELEASE"
            rm -f /tmp/deploy.tar.gz

            echo "Switching current symlink..."
            ln -sfn "$NEW_RELEASE" "$APP_DIR/current"

            echo "Fixing permissions..."
            sudo chown -h $USER:$USER "$APP_DIR/current"
            sudo chown -R $USER:$USER "$NEW_RELEASE"

            echo "Testing nginx config..."
            sudo nginx -t

            echo "Reloading nginx..."
            sudo systemctl reload nginx

            echo "Cleaning old releases, keeping last 5..."
            cd "$RELEASES_DIR"
            ls -1dt */ | tail -n +6 | xargs -r rm -rf

            echo "✅ Deployment completed successfully"
          EOF

          rm -f private_key.pem

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Waiting for deployment..."
          sleep 5

          for i in {1..5}; do
            echo "Attempt $i..."
            response=$(curl -s -o /dev/null -w "%{http_code}" http://${EC2_HOST} || echo "000")

            if [ "$response" = "200" ]; then
              echo "✅ Deployment successful! HTTP $response"
              exit 0
            fi

            echo "Got response: $response"
            sleep 5
          done

          echo "❌ Deployment verification failed"
          exit 1

      - name: Rollback on failure
        if: failure()
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << 'EOF'
            set -e

            APP_DIR="/var/www/apex-frontend-app/AF_Core"
            RELEASES_DIR="$APP_DIR/releases"

            cd "$RELEASES_DIR"

            PREVIOUS_RELEASE=$(ls -1dt */ | sed -n '2p')

            if [ -n "$PREVIOUS_RELEASE" ]; then
              echo "Rolling back to $PREVIOUS_RELEASE"
              ln -sfn "$RELEASES_DIR/$PREVIOUS_RELEASE" "$APP_DIR/current"
              sudo nginx -t
              sudo systemctl reload nginx
              echo "✅ Rollback completed"
            else
              echo "⚠️ No previous release found"
            fi
          EOF

          rm -f private_key.pem
